// ---------- React via htm + preact-like approach using vanilla ----------
// Using a minimal reactive approach with vanilla JS for zero build step

const MEDS = [
  { id:'dexamethasone', name:'Dexamethasone', sub:'Steroid · chemo premed', type:'win', alerts:true, chemoOnly:true, note:'2 tablets · 8 AM & 2 PM · day before chemo through day after',
    doses:[{label:'2 tablets',pills:2,mg:0}],
    windows:[{start:8,end:12,name:'Morning'},{start:14,end:18,name:'Afternoon'}] },
  { id:'tylenol', name:'Tylenol', sub:'Acetaminophen', type:'gap', gapH:4, ceiling:true, painScale:true, note:'Min 4-hour gap',
    doses:[{label:'500 mg',mg:500},{label:'1000 mg',mg:1000}] },
  { id:'zofran', name:'Zofran', sub:'Ondansetron', type:'gap', gapH:0, note:'As needed — no gap timer' },
  { id:'compazine', name:'Compazine', sub:'Prochlorperazine', type:'gap', gapH:6, note:'10 PM · earlier as needed · min 6h gap' },
  { id:'morphine', name:'Morphine', sub:'Immediate release', type:'gap', gapH:4, note:'4-hour gap', painScale:true,
    doses:[{label:'½ tab · 7.5 mg',mg:7.5},{label:'Full · 15 mg',mg:15}] },
  { id:'lidocaine', name:'Lidocaine', sub:'Topical cream', type:'gap', gapH:4, ceiling:true, ceilingMax:4, ceilingUnit:'applications', note:'Min 4-hour gap · max 4 applications/day',
    doses:[{label:'Apply',pills:1,mg:0}] },
  { id:'protonix', name:'Protonix', sub:'Pantoprazole', type:'win', alerts:true, note:'Twice daily · 8 AM & 8 PM',
    windows:[{start:8,end:12,name:'Morning'},{start:20,end:22,name:'Evening'}] },
  { id:'buspirone', name:'Buspirone', sub:'BuSpar', type:'win', alerts:true, note:'Once daily · 10 PM',
    windows:[{start:22,end:24,name:'Night'}] },
  { id:'paroxetine', name:'Paroxetine', sub:'Paxil', type:'win', alerts:true, note:'Once daily · 10 PM',
    windows:[{start:22,end:24,name:'Night'}] },
  { id:'iron', name:'Iron', sub:'Ferrous sulfate', type:'win', alerts:true, note:'Once daily · 10 PM',
    windows:[{start:22,end:24,name:'Night'}] },
  { id:'senokot', name:'Senokot', sub:'Senna', type:'win', note:'2 pills · 8 AM & 10 PM · as needed',
    doses:[{label:'2 pills',pills:2,mg:0}],
    windows:[{start:8,end:12,name:'Morning'},{start:22,end:24,name:'Night'}] },
  { id:'imodium', name:'Imodium', sub:'Loperamide', type:'gap', gapH:0, ceiling:true, ceilingMax:4, ceilingUnit:'pills', note:'Max 4 pills per day',
    doses:[{label:'2 pills (onset)',pills:2,mg:0},{label:'1 pill',pills:1,mg:0}] },
];

const CONFIG = { patientName: 'Brandi', ceilingMg: 2500, tempUnit: 'Fahrenheit' };

// State
let state = { entries: [], chemoDates: [], now: Date.now(), toast: null, warn: null, demo: false, tab: 'today', override: null, confirmRemove: null, tempInput: '', weightInput: '', chemoInput: '', weightRange: 'weeks', timeModal: null, loaded: false, dateOffsetDays: 0 };
let toastTimer = null;
let unsub = null;
let pendingEntries = null;

function setState(patch) {
  Object.assign(state, patch);
  // Flush any deferred Firestore entries when the time modal closes
  if (!state.timeModal && pendingEntries) {
    state.entries = pendingEntries;
    pendingEntries = null;
  }
  render();
}

// Helpers
function dayStart(ts) { const d = new Date(ts); return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime(); }

// ---- TESTING-ONLY date override ----
// Lets Aaron simulate a different "today" in this testing app so date-dependent features (chemo
// offsets, missed-dose windows, cycle day counter, in-patient ranges) can be exercised without
// waiting for real time to pass. Only ever active when TEST_MODE is true — simNow() falls back to
// real Date.now() whenever TEST_MODE is false, so this has zero effect if this code is ever
// promoted/copied into production with TEST_MODE = false.
function simNow() {
  if (!TEST_MODE) return Date.now();
  return Date.now() + (state.dateOffsetDays || 0) * 86400000;
}
function setSimDate(dateStr) {
  if (!TEST_MODE || !dateStr) return;
  const p = dateStr.split('-').map(Number);
  const picked = dayStart(new Date(p[0], p[1] - 1, p[2]).getTime());
  const realToday = dayStart(Date.now());
  state.dateOffsetDays = Math.round((picked - realToday) / 86400000); // set first so simNow() below sees it
  setState({ now: simNow() });
}
function shiftSimDate(days) {
  if (!TEST_MODE) return;
  state.dateOffsetDays = (state.dateOffsetDays || 0) + days; // set first so simNow() below sees it
  setState({ now: simNow() });
}
function resetSimDate() {
  if (!TEST_MODE) return;
  state.dateOffsetDays = 0; // set first so simNow() below sees it
  setState({ now: simNow() });
}
function entriesFor(id) { return state.entries.filter(e => e.medId === id); }
function latest(id) { const es = entriesFor(id); return es.length ? es.reduce((a, b) => a.ts > b.ts ? a : b) : null; }
function tempSuffix() { return CONFIG.tempUnit === 'Celsius' ? '°C' : '°F'; }
function tempFever() { return CONFIG.tempUnit === 'Celsius' ? 38.0 : 100.4; }
function tempHigh() { return CONFIG.tempUnit === 'Celsius' ? 39.4 : 103; }
function tylenolMg() { const c = dayStart(state.now); return entriesFor('tylenol').filter(e => e.ts >= c).reduce((s, e) => s + (e.mg || 0), 0); }
function dailyPills(medId) { const c = dayStart(state.now); return entriesFor(medId).filter(e => e.ts >= c).reduce((s, e) => s + (e.pills || 0), 0); }
function isEarlyAt(med, ts) {
  if (med.type === 'gap') {
    if (!med.gapH) return false;
    const prev = entriesFor(med.id).filter(e => e.ts < ts).sort((a, b) => a.ts - b.ts).pop();
    return !!prev && ts < prev.ts + med.gapH * 3600000;
  }
  const d0 = dayStart(ts);
  return !med.windows.some(w => ts >= d0 + w.start * 3600000 && ts < d0 + w.end * 3600000);
}
function usedRecently(id) { return entriesFor(id).some(e => e.ts >= state.now - 7 * 86400000); }
function dailyCeiling(med) {
  if (!med.ceiling) return null;
  if (med.ceilingUnit) return { used: dailyPills(med.id), max: med.ceilingMax, unit: med.ceilingUnit, label: med.ceilingMax + ' ' + med.ceilingUnit };
  return { used: tylenolMg(), max: CONFIG.ceilingMg, unit: 'mg', label: CONFIG.ceilingMg.toLocaleString() + ' mg' };
}
// Missed-dose detection. A window counts as covered by any dose logged that day
// before the window closed (and after the previous window closed) — so early logs
// like a 7:45 AM Protonix still cover the 8 AM window. Only meds with alerts:true.
// ---- Chemo cycle ----
// The next chemo date is the most recently logged 'chemo_date' record (append-only,
// so rescheduling just logs a new record; ts 0 means cleared).
function nextChemoTs() {
  if (!state.chemoDates.length) return null;
  const latest = state.chemoDates.reduce((a, b) => (((a.loggedAt || 0) > (b.loggedAt || 0)) ? a : b));
  return latest.ts > 0 ? latest.ts : null;
}
function chemoOffsetFor(dayTs) {
  const c = nextChemoTs();
  if (c === null) return null;
  return Math.round((dayStart(dayTs) - dayStart(c)) / 86400000);
}
function dexActiveOn(dayTs) { const o = chemoOffsetFor(dayTs); return o !== null && o >= -1 && o <= 1; }
function zofranBlockedOn(dayTs) { const o = chemoOffsetFor(dayTs); return o === 0 || o === 1; }

const MISSED_TRACK_SINCE = new Date(2026, 6, 12).getTime(); // Jul 12, 2026 — no retroactive flags before this
function missedDosesFor(dayTs, now) {
  const d0 = dayStart(dayTs);
  if (d0 < dayStart(MISSED_TRACK_SINCE)) return [];
  if (isInpatientDay(d0)) return []; // meds given by hospital staff that day — not tracked here
  const out = [];
  MEDS.filter(m => m.alerts && m.windows).forEach(med => {
    if (med.chemoOnly && !dexActiveOn(d0)) return;
    const dayEntries = entriesFor(med.id).filter(e => e.ts >= d0 && e.ts < d0 + 86400000).sort((a, b) => a.ts - b.ts);
    let segStart = d0;
    med.windows.forEach(w => {
      const ws = d0 + w.start * 3600000, we = d0 + w.end * 3600000;
      if (now >= we) {
        const covered = dayEntries.some(e => e.ts >= segStart && e.ts < we);
        if (!covered) out.push({ missed: true, medId: med.id, ts: ws, windowName: w.name });
      }
      segStart = we;
    });
  });
  return out.sort((a, b) => a.ts - b.ts);
}
function timeBucket(ts) { const hr = new Date(ts).getHours(); if (hr < 6) return 'Overnight'; if (hr < 12) return 'Morning'; if (hr < 17) return 'Afternoon'; return 'Evening'; }
function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function fmtCountdown(ms) {
  if (ms <= 0) return '0m';
  const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return h + 'h ' + m + 'm';
  if (m >= 1) { if (m < 5) { const s = Math.floor((ms % 60000) / 1000); return m + 'm ' + s + 's'; } return m + 'm'; }
  return Math.max(1, Math.floor(ms / 1000)) + 's';
}
function nameOf(id) { if (id === 'temp') return 'Temperature'; if (id === 'weight') return 'Weight'; if (id === 'cycle_start') return 'Period Start'; if (id === 'cycle_end') return 'Period End'; if (id === 'inpatient') return 'In-Patient Day'; const m = MEDS.find(x => x.id === id); return m ? m.name : id; }
function nowLocalISO() {
  const d = new Date(simNow());
  const pad = n => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function fmtDateLabel(ts) {
  const d0 = dayStart(Date.now());
  const entryDay = dayStart(ts);
  const time = new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  const weekday = new Date(ts).toLocaleDateString([], { weekday: 'long' });
  const md = (new Date(ts).getMonth() + 1) + '/' + new Date(ts).getDate();
  if (entryDay === d0) {
    return 'Today - ' + weekday + ' ' + md + ' at ' + time;
  }
  return weekday + ', ' + md + ' at ' + time;
}

function status(med) {
  const now = state.now;
  if (med.id === 'zofran' && zofranBlockedOn(now)) {
    return { locked: true, chemoBlock: true, availableAt: dayStart(nextChemoTs()) + 2 * 86400000 };
  }
  const es = entriesFor(med.id).slice().sort((a, b) => a.ts - b.ts);
  if (med.type === 'gap') {
    // Check daily ceiling first (Tylenol mg or Imodium pills)
    if (med.ceiling) {
      const dc = dailyCeiling(med);
      if (dc && dc.used >= dc.max) {
        return { locked: true, ceilingHit: true, ceilingLabel: dc.label };
      }
    }
    const last = es[es.length - 1];
    if (!last) return { locked: false };
    const at = last.ts + med.gapH * 3600000;
    return { locked: now < at, availableAt: at };
  }
  const d0 = dayStart(now), atH = (h) => d0 + h * 3600000;
  for (const w of med.windows) {
    const ws = atH(w.start), we = atH(w.end);
    const used = es.some(e => e.ts >= ws && e.ts < we);
    if (used) continue;
    if (now < ws) return { locked: true, availableAt: ws, windowName: w.name };
    if (now >= ws && now < we) return { locked: false, windowName: w.name };
  }
  const first = med.windows[0];
  return { locked: true, availableAt: d0 + 86400000 + first.start * 3600000, windowName: first.name };
}

function setToast(msg) {
  setState({ toast: msg });
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => setState({ toast: null }), 4500);
}

function afterLog(entry) {
  const twoH = 2 * 3600000;
  if (entry.medId === 'iron' || entry.medId === 'protonix') {
    const other = entry.medId === 'iron' ? 'protonix' : 'iron';
    const near = state.entries.find(e => e.medId === other && e.id !== entry.id && Math.abs(e.ts - entry.ts) <= twoH);
    if (near) { setState({ warn: { tone: 'amber', title: 'Iron + Protonix timing', body: 'Iron and Protonix were logged within 2 hours of each other. Protonix (a PPI) lowers stomach acid, which can markedly reduce iron absorption. Aim to separate the two by at least 2 hours.' } }); return; }
  }
  if (entry.medId === 'tylenol') {
    const mg = tylenolMg();
    if (mg > CONFIG.ceilingMg) { setState({ warn: { tone: 'red', title: 'Acetaminophen ceiling exceeded', body: "Today's Tylenol total is " + mg.toLocaleString() + " mg, above the " + CONFIG.ceilingMg.toLocaleString() + " mg daily limit. Do not give more without contacting the care team." } }); }
  }
  if (entry.medId === 'imodium') {
    const pills = dailyPills('imodium');
    if (pills > 4) { setState({ warn: { tone: 'red', title: 'Imodium daily limit exceeded', body: "Today's Imodium total is " + pills + " pills, above the 4-pill daily limit. Do not give more without contacting the care team." } }); }
  }
  if (entry.medId === 'lidocaine') {
    const apps = dailyPills('lidocaine');
    if (apps > 4) { setState({ warn: { tone: 'red', title: 'Lidocaine daily limit exceeded', body: "Today's Lidocaine total is " + apps + " applications, above the 4-application daily limit. Do not apply more without contacting the care team." } }); }
  }
}

async function logMed(medId, dose, opts) {
  opts = opts || {};
  const med = MEDS.find(m => m.id === medId);
  const st = status(med);
  if (st.locked && !opts.force) { setState({ override: { medId } }); return; }
  setState({ override: null, timeModal: { type: 'med', medId, dose, opts, timeValue: nowLocalISO() } });
}

function tempDefault() { return CONFIG.tempUnit === 'Celsius' ? '36.9' : '98.5'; }
async function logTemp() {
  const raw = (state.tempInput || '').trim();
  const v = parseFloat(raw);
  if (!raw || isNaN(v) || v <= 0 || v > 120) { setToast('Enter a valid temperature'); return; }
  setState({ timeModal: { type: 'temp', tempValue: v, timeValue: nowLocalISO() } });
}

async function setChemoDate() {
  const raw = (state.chemoInput || '').trim();
  if (!raw) { setToast('Pick a date first'); return; }
  const p = raw.split('-').map(Number);
  const ts = new Date(p[0], p[1] - 1, p[2]).getTime();
  if (isNaN(ts)) { setToast('Invalid date'); return; }
  await addEntryDB({ medId: 'chemo_date', dose: 'Chemo scheduled', mg: 0, ts, loggedAt: Date.now() });
  setState({ chemoInput: '' });
  setToast('Chemo date set — ' + new Date(ts).toLocaleDateString());
}

function weightDefault() { const lw = latest('weight'); return lw ? String(lw.weight) : ''; }
async function logWeight() {
  const raw = (state.weightInput || '').trim();
  const v = parseFloat(raw);
  if (!raw || isNaN(v) || v <= 0 || v > 999) { setToast('Enter a valid weight'); return; }
  setState({ timeModal: { type: 'weight', weightValue: v, timeValue: nowLocalISO() } });
}

async function confirmTimeAndLog() {
  const m = state.timeModal;
  if (!m) return;
  const ts = new Date(m.timeValue).getTime();
  if (isNaN(ts)) { setToast('Invalid time'); return; }
  if (ts > simNow() + 60000 && !m.futureOk) { state.timeModal.futureOk = true; setState({ timeModal: state.timeModal }); return; }

  if (m.type === 'med') {
    const med = MEDS.find(x => x.id === m.medId);
    if (med.painScale && !m.painLevel) { setToast('Select a pain level before logging ' + med.name); return; }
    const entry = { medId: m.medId, dose: m.dose ? m.dose.label : null, mg: m.dose ? (m.dose.mg || 0) : 0, ts };
    if (m.dose && m.dose.pills) entry.pills = m.dose.pills;
    if (med.painScale && m.painLevel) entry.painLevel = m.painLevel;
    const early = !!(m.opts && m.opts.force) && isEarlyAt(med, ts);
    if (early) entry.override = true;
    setState({ timeModal: null });
    await addEntryDB(entry);
    setToast(med.name + ' logged' + (m.dose ? (' · ' + m.dose.label) : '') + (entry.painLevel ? (' · Pain ' + entry.painLevel + '/10') : '') + (early ? ' (early)' : '') + ' at ' + fmtTime(ts));
    setTimeout(() => afterLog({ ...entry, id: 'pending' }), 500);
  } else if (m.type === 'temp') {
    const v = m.tempValue;
    const suffix = tempSuffix();
    const entry = { medId: 'temp', temp: v, dose: v + ' ' + suffix, mg: 0, ts };
    setState({ tempInput: '', timeModal: null });
    await addEntryDB(entry);
    setToast('Temperature ' + v + ' ' + suffix + ' logged at ' + fmtTime(ts));
  } else if (m.type === 'weight') {
    const v = m.weightValue;
    const entry = { medId: 'weight', weight: v, dose: v + ' lbs', mg: 0, ts };
    setState({ weightInput: '', timeModal: null });
    await addEntryDB(entry);
    setToast('Weight ' + v + ' lbs logged at ' + fmtTime(ts));
  } else if (m.type === 'multi') {
    const ids = m.medIds;
    setState({ timeModal: null });
    for (const id of ids) {
      const md = MEDS.find(x => x.id === id);
      const d0 = md && md.doses ? md.doses[0] : null;
      const en = { medId: id, dose: d0 ? d0.label : null, mg: d0 ? (d0.mg || 0) : 0, ts };
      if (d0 && d0.pills) en.pills = d0.pills;
      await addEntryDB(en);
    }
    setToast(ids.length + ' meds logged at ' + fmtTime(ts));
    setTimeout(() => { if (ids.includes('iron')) afterLog({ medId: 'iron', ts, id: 'pending' }); }, 500);
  }
}

async function removeEntry(id) {
  await removeEntryDB(id);
}

async function seedDemo() {
  const n = simNow(), H = 3600000, d0 = dayStart(n);
  const y = d0 - 24 * H;
  const seeds = [
    { medId: 'tylenol', dose: '500 mg', mg: 500, ts: y + 9 * H },
    { medId: 'temp', temp: 100.9, dose: '100.9 °F', mg: 0, ts: y + 9 * H },
    { medId: 'zofran', dose: null, mg: 0, ts: y + 13 * H },
    { medId: 'protonix', dose: null, mg: 0, ts: y + 19 * H },
    { medId: 'tylenol', dose: '1000 mg', mg: 1000, ts: n - 2 * H },
    { medId: 'tylenol', dose: '500 mg', mg: 500, ts: n - 6.5 * H },
    { medId: 'zofran', dose: null, mg: 0, ts: n - 3.2 * H },
    { medId: 'morphine', dose: 'Full · 15 mg', mg: 15, ts: n - 1.1 * H },
    { medId: 'protonix', dose: null, mg: 0, ts: d0 + 8 * H },
    { medId: 'iron', dose: null, mg: 0, ts: n - 5 * H },
    { medId: 'temp', temp: 99.8, dose: '99.8 °F', mg: 0, ts: n - 1.5 * H },
  ].filter(e => e.ts <= n);
  for (const s of seeds) await addEntryDB(s);
  setState({ demo: true });
}

// ---- Menstrual cycle tracking ----
// Instant one-tap events, no time picker — logs at the current moment.
function cycleEntries() { return state.entries.filter(e => e.medId === 'cycle_start' || e.medId === 'cycle_end').sort((a, b) => a.ts - b.ts); }
function cycleActive() {
  const es = cycleEntries();
  if (!es.length) return false;
  return es[es.length - 1].medId === 'cycle_start';
}
function lastCycleStart() {
  const es = entriesFor('cycle_start');
  return es.length ? es.reduce((a, b) => a.ts > b.ts ? a : b) : null;
}
function daysSinceCycleStart() {
  const last = lastCycleStart();
  if (!last) return null;
  return Math.floor((dayStart(state.now) - dayStart(last.ts)) / 86400000) + 1; // start day counts as Day 1
}
async function logCycleStart() { await addEntryDB({ medId: 'cycle_start', dose: null, mg: 0, ts: simNow() }); setToast('Period start logged'); }
async function logCycleEnd() { await addEntryDB({ medId: 'cycle_end', dose: null, mg: 0, ts: simNow() }); setToast('Period end logged'); }

// ---- In-Patient (hospital) day tracking ----
// One tap marks/unmarks TODAY as an in-patient day. History groups consecutive days into ranges.
function isInpatientDay(ts) {
  const d0 = dayStart(ts);
  return state.entries.some(e => e.medId === 'inpatient' && dayStart(e.ts) === d0);
}
function isInpatientToday() { return isInpatientDay(state.now); }
async function toggleInpatientToday() {
  const d0 = dayStart(state.now);
  const existing = state.entries.find(e => e.medId === 'inpatient' && dayStart(e.ts) === d0);
  if (existing) {
    await removeEntryDB(existing.id);
    setToast('In-Patient day removed');
  } else {
    await addEntryDB({ medId: 'inpatient', dose: 'In-Patient day', mg: 0, ts: simNow() });
    setToast('Marked today as In-Patient');
  }
}
function inpatientRanges() {
  const days = [...new Set(state.entries.filter(e => e.medId === 'inpatient').map(e => dayStart(e.ts)))].sort((a, b) => a - b);
  const ranges = [];
  let cur = null;
  days.forEach(d => {
    if (cur && d - cur.end === 86400000) { cur.end = d; }
    else { cur = { start: d, end: d }; ranges.push(cur); }
  });
  return ranges.reverse(); // most recent first
}
function fmtInpatientDate(ts) {
  const d = new Date(ts);
  return (d.getMonth() + 1) + '/' + d.getDate() + '/' + d.getFullYear();
}
function fmtInpatientRange(r) {
  if (r.start === r.end) return fmtInpatientDate(r.start);
  const days = Math.round((r.end - r.start) / 86400000) + 1;
  return fmtInpatientDate(r.start) + ' – ' + fmtInpatientDate(r.end) + ' (' + days + ' days)';
}


// --------- Render ---------
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(el.style, v);
      } else if (k.startsWith('on') && typeof v === 'function') {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'innerHTML') {
        el.innerHTML = v;
      } else if (k === 'className') {
        el.className = v;
      } else {
        el.setAttribute(k, v);
      }
    }
  }
  for (const child of children.flat(Infinity)) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' || typeof child === 'number' ? document.createTextNode(String(child)) : child);
  }
  return el;
}

function renderHistory(now) {
  const d0 = dayStart(now);
  const yStart = d0 - 86400000;
  const dmap = {};
  state.entries.forEach(e => { if (e.medId === 'inpatient') return; const k = dayStart(e.ts); (dmap[k] = dmap[k] || []).push(e); });

  const historyDays = Object.keys(dmap).map(k => +k).sort((a, b) => b - a).map(k => {
    const missed = missedDosesFor(k, now);
    const items = [...dmap[k], ...missed].sort((a, b) => a.ts - b.ts);
    const tyDay = items.filter(e => e.medId === 'tylenol' && !e.missed).reduce((s, e) => s + (e.mg || 0), 0);
    const doses = items.filter(e => e.medId !== 'temp' && e.medId !== 'weight' && e.medId !== 'cycle_start' && e.medId !== 'cycle_end' && !e.missed).length;
    const temps = items.filter(e => e.medId === 'temp').length;
    const weights = items.filter(e => e.medId === 'weight').length;
    const wkday = new Date(k).toLocaleDateString([], { weekday: 'long' });
    const md = (new Date(k).getMonth() + 1) + '/' + new Date(k).getDate();
    const label = k === d0 ? ('Today - ' + wkday + ' ' + md) : (wkday + ', ' + md);
    let summary = doses + ' dose' + (doses === 1 ? '' : 's');
    if (temps) summary += ' · ' + temps + ' temp' + (temps === 1 ? '' : 's');
    if (weights) summary += ' · ' + weights + ' wt';
    if (tyDay) summary += ' · ' + tyDay.toLocaleString() + ' mg APAP';
    const imoDay = items.filter(e => e.medId === 'imodium' && !e.missed).reduce((s, e) => s + (e.pills || 0), 0);
    if (imoDay) summary += ' · ' + imoDay + ' Imodium';
    if (missed.length) summary += ' · ' + missed.length + ' MISSED';
    return { key: k, label, summary, items };
  });

  if (historyDays.length === 0) {
    return [h('div', { style: { background: 'rgba(255,255,255,0.4)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', border: '1px dashed rgba(212,104,138,0.2)', borderRadius: '16px', padding: '30px', textAlign: 'center', color: '#7D6974', fontSize: '14px', lineHeight: '1.5' } }, 'No history yet.')];
  }

  return [h('div', { style: { display: 'flex', flexDirection: 'column', gap: '16px' } },
    ...historyDays.map(d => h('div', null,
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: '10px', marginBottom: '8px' } },
        h('div', { style: { fontSize: '13px', fontWeight: '800', letterSpacing: '0.03em', textTransform: 'uppercase', color: '#8A6479' } }, d.label),
        h('div', { className: 'mono', style: { fontSize: '12px', color: d.summary.includes('MISSED') ? '#C0453B' : '#7D6974', fontWeight: d.summary.includes('MISSED') ? '700' : '400' } }, d.summary)
      ),
      h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 24px rgba(180,130,150,0.10), 0 1px 2px rgba(180,130,150,0.06), inset 0 1px 0 rgba(255,255,255,0.7)' } },
        ...(() => {
          const rows = [];
          d.items.forEach((e, i) => {
            const bk = timeBucket(e.ts);
            const newGroup = i === 0 || timeBucket(d.items[i - 1].ts) !== bk;
            if (newGroup) {
              rows.push(h('div', { style: { padding: '8px 14px 4px', fontSize: '10.5px', fontWeight: '800', letterSpacing: '0.06em', textTransform: 'uppercase', color: '#7D6974', background: 'rgba(212,104,138,0.06)', borderTop: i > 0 ? '1px solid rgba(212,104,138,0.08)' : 'none' } }, bk));
            }
            if (e.missed) { rows.push(missedRow(e, newGroup ? 0 : 1)); return; }
            rows.push(h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '12px 14px', borderTop: newGroup ? 'none' : '1px solid rgba(212,104,138,0.08)' } },
              h('div', { className: 'mono', style: { fontSize: '13px', color: '#8A6479', minWidth: '66px' } }, fmtTime(e.ts)),
              h('div', { style: { flex: '1' } },
                h('div', { style: { fontSize: '15px', fontWeight: '700', display: 'flex', alignItems: 'center', gap: '7px', flexWrap: 'wrap' } },
                  nameOf(e.medId),
                  e.override ? h('span', { style: { fontSize: '10.5px', fontWeight: '700', letterSpacing: '0.04em', textTransform: 'uppercase', color: '#A15B56', background: 'rgba(192,69,59,0.15)', border: '1px solid rgba(192,69,59,0.3)', borderRadius: '6px', padding: '1px 6px' } }, 'Early') : null
                ),
                e.dose ? h('div', { style: { fontSize: '12.5px', color: '#8A6479' } }, e.dose + (e.painLevel ? (' · Pain ' + e.painLevel + '/10') : '')) : (e.painLevel ? h('div', { style: { fontSize: '12.5px', color: '#8A6479' } }, 'Pain ' + e.painLevel + '/10') : null)
              ),
              removeBtn(e)
            ));
          });

function renderWeightTrend(now) {
  const weightEntries = state.entries.filter(e => e.medId === 'weight' && e.weight).sort((a, b) => a.ts - b.ts);
  const range = state.weightRange;
  const DAY = 86400000;

  // Range toggle
  const toggle = h('div', { style: { display: 'flex', gap: '5px', background: 'rgba(255,255,255,0.45)', borderRadius: '10px', padding: '3px', border: '1px solid rgba(212,104,138,0.12)', alignSelf: 'flex-start' } },
    h('button', { onClick: () => setState({ weightRange: 'weeks' }), style: { padding: '8px 18px', borderRadius: '8px', fontSize: '13px', fontWeight: '700', background: range === 'weeks' ? '#9B5B8A' : 'transparent', color: range === 'weeks' ? '#fff' : '#7D6974' } }, 'Weeks'),
    h('button', { onClick: () => setState({ weightRange: 'months' }), style: { padding: '8px 18px', borderRadius: '8px', fontSize: '13px', fontWeight: '700', background: range === 'months' ? '#9B5B8A' : 'transparent', color: range === 'months' ? '#fff' : '#7D6974' } }, 'Months')
  );

  // Menstrual Cycle card — instant one-tap Start/End logging, no time picker
  const cycleActiveNow = cycleActive();
  const cycleDayN = daysSinceCycleStart();
  const cycleCard = h('section', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '18px', padding: '16px 17px', boxShadow: '0 4px 24px rgba(180,130,150,0.10), 0 1px 2px rgba(180,130,150,0.06), inset 0 1px 0 rgba(255,255,255,0.7)' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '12px' } },
      h('div', null,
        h('div', { style: { fontSize: '11.5px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#8A6479' } }, 'Menstrual Cycle'),
        h('div', { style: { fontSize: '12.5px', color: '#7D6974', marginTop: '3px' } }, cycleDayN !== null ? ('Day ' + cycleDayN + ' since last period start') : 'No period logged yet')
      ),
      cycleActiveNow ? h('div', { style: { display: 'inline-flex', alignItems: 'center', gap: '6px', background: 'rgba(212,104,138,0.12)', color: '#AA5375', border: '1px solid rgba(212,104,138,0.25)', borderRadius: '99px', padding: '5px 11px', fontSize: '12.5px', fontWeight: '700', flexShrink: '0' } },
        h('span', { style: { width: '7px', height: '7px', borderRadius: '50%', background: '#AA5375', display: 'inline-block' } }),
        'Active'
      ) : null
    ),
    h('button', { onClick: cycleActiveNow ? logCycleEnd : logCycleStart, style: { marginTop: '12px', width: '100%', minHeight: '52px', borderRadius: '13px', background: cycleActiveNow ? '#9B5B8A' : '#AA5375', color: '#fff', fontSize: '15px', fontWeight: '700', boxShadow: 'inset 0 -2px 0 rgba(150,60,90,0.35)' } }, cycleActiveNow ? 'Log Period End' : 'Log Period Start')
  );

  if (weightEntries.length === 0) {
    return [
      cycleCard,
      toggle,
      h('div', { style: { background: 'rgba(255,255,255,0.03)', border: '1px dashed rgba(255,255,255,0.1)', borderRadius: '16px', padding: '40px', textAlign: 'center', color: '#7D6974', fontSize: '14px', lineHeight: '1.5' } }, 'No weight readings logged yet.\nLog your first weight on the Today tab.')
    ];
  }

  // Determine time range
  const spanDays = range === 'weeks' ? 28 : 90;
  const minTs = now - spanDays * DAY;
  const filtered = weightEntries.filter(e => e.ts >= minTs);
  const points = filtered.length > 0 ? filtered : weightEntries.slice(-2);

  if (points.length === 0) {
    return [cycleCard, toggle, h('div', { style: { color: '#7D6974', fontSize: '14px', textAlign: 'center', padding: '40px' } }, 'No data in this range.')];
  }

  // Calculate bounds
  const weights = points.map(p => p.weight);
  const allWeights = weightEntries.map(p => p.weight);
  const minW = Math.floor(Math.min(...weights) - 2);
  const maxW = Math.ceil(Math.max(...weights) + 2);
  const wRange = maxW - minW || 4;
  const tMin = points[0].ts;
  const tMax = Math.max(points[points.length - 1].ts, tMin + DAY);
  const tRange = tMax - tMin || DAY;

  // SVG dimensions
  const W = 680, H = 300;
  const pad = { top: 30, right: 20, bottom: 50, left: 55 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const x = (ts) => pad.left + ((ts - tMin) / tRange) * cW;
  const y = (w) => pad.top + cH - ((w - minW) / wRange) * cH;

  // Build SVG path
  let pathD = '';
  let areaD = '';
  const dots = [];
  points.forEach((p, i) => {
    const px = x(p.ts), py = y(p.weight);
    pathD += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
    if (i === 0) areaD = 'M' + px.toFixed(1) + ',' + (pad.top + cH);
    areaD += 'L' + px.toFixed(1) + ',' + py.toFixed(1);
    dots.push({ x: px, y: py, w: p.weight, ts: p.ts });
  });
  areaD += 'L' + x(points[points.length - 1].ts).toFixed(1) + ',' + (pad.top + cH) + 'Z';

  // Y-axis labels (weight)
  const ySteps = 5;
  const yLabels = [];
  for (let i = 0; i <= ySteps; i++) {
    const val = minW + (wRange / ySteps) * i;
    yLabels.push({ val: Math.round(val * 10) / 10, py: y(val) });
  }

  // X-axis labels (dates)
  const xLabels = [];
  const labelCount = range === 'weeks' ? 4 : 6;
  for (let i = 0; i <= labelCount; i++) {
    const ts = tMin + (tRange / labelCount) * i;
    const d = new Date(ts);
    const label = (d.getMonth() + 1) + '/' + d.getDate();
    xLabels.push({ label, px: x(ts) });
  }

  // Stats
  const latest = points[points.length - 1];
  const first = points[0];
  const change = latest.weight - first.weight;
  const changeLabel = (change >= 0 ? '+' : '') + change.toFixed(1) + ' lbs';
  const changeColor = Math.abs(change) < 0.5 ? '#8A6479' : change > 0 ? '#9A6419' : '#AA5375';
  const avg = (weights.reduce((s, w) => s + w, 0) / weights.length).toFixed(1);

  // Build SVG as string
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">';
  // Grid lines
  yLabels.forEach(yl => {
    svg += '<line x1="' + pad.left + '" y1="' + yl.py.toFixed(1) + '" x2="' + (W - pad.right) + '" y2="' + yl.py.toFixed(1) + '" stroke="rgba(212,104,138,0.10)" stroke-width="1"/>';
    svg += '<text x="' + (pad.left - 10) + '" y="' + (yl.py + 4).toFixed(1) + '" fill="#7D6974" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="end">' + yl.val + '</text>';
  });
  // X labels
  xLabels.forEach(xl => {
    svg += '<text x="' + xl.px.toFixed(1) + '" y="' + (H - 10) + '" fill="#7D6974" font-size="11" font-family="IBM Plex Mono,monospace" text-anchor="middle">' + xl.label + '</text>';
  });
  // Area gradient
  svg += '<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(155,91,138,0.25)"/><stop offset="100%" stop-color="rgba(155,91,138,0)"/></linearGradient></defs>';
  svg += '<path d="' + areaD + '" fill="url(#wg)"/>';
  // Line
  svg += '<path d="' + pathD + '" fill="none" stroke="#9B5B8A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
  // Dots
  dots.forEach((d, i) => {
    const isLast = i === dots.length - 1;
    svg += '<circle cx="' + d.x.toFixed(1) + '" cy="' + d.y.toFixed(1) + '" r="' + (isLast ? 5 : 3.5) + '" fill="' + (isLast ? '#9B5B8A' : '#7B3F6B') + '" stroke="' + (isLast ? '#AA5375' : '#9B5B8A') + '" stroke-width="' + (isLast ? 2 : 1.5) + '"/>';
    // Value label on last dot
    if (isLast) {
      svg += '<text x="' + d.x.toFixed(1) + '" y="' + (d.y - 12).toFixed(1) + '" fill="#7B3F6B" font-size="13" font-weight="700" font-family="IBM Plex Mono,monospace" text-anchor="middle">' + d.w + '</text>';
    }
  });
  svg += '</svg>';

  // Chart card
  const chart = h('section', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '18px', padding: '20px 16px 12px', boxShadow: '0 4px 24px rgba(180,130,150,0.10), 0 1px 2px rgba(180,130,150,0.06), inset 0 1px 0 rgba(255,255,255,0.7)' } },
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px' } },
      h('div', null,
        h('div', { style: { fontSize: '11.5px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#8A6479' } }, 'Weight Trend'),
        h('div', { style: { fontSize: '12.5px', color: '#7D6974', marginTop: '3px' } }, range === 'weeks' ? 'Last 4 weeks' : 'Last 3 months')
      ),
      h('div', { className: 'mono', style: { fontSize: '24px', fontWeight: '700', color: '#7B3F6B', letterSpacing: '-0.02em' } }, latest.weight + ' lbs')
    ),
    h('div', { innerHTML: svg })
  );

  // Stats row
  const stats = h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '10px' } },
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#7D6974', marginBottom: '6px' } }, 'Current'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: '#3D2B3A' } }, latest.weight + '')
    ),
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#7D6974', marginBottom: '6px' } }, 'Average'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: '#3D2B3A' } }, avg)
    ),
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '14px', padding: '14px', textAlign: 'center', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      h('div', { style: { fontSize: '11px', fontWeight: '700', letterSpacing: '0.05em', textTransform: 'uppercase', color: '#7D6974', marginBottom: '6px' } }, 'Change'),
      h('div', { className: 'mono', style: { fontSize: '18px', fontWeight: '700', color: changeColor } }, changeLabel)
    )
  );

  // Readings list
  const readingsItems = points.slice().reverse().map((p, i) => {
    const d = new Date(p.ts);
    const day = d.toLocaleDateString([], { weekday: 'short', month: 'numeric', day: 'numeric' });
    const time = fmtTime(p.ts);
    return h('div', { style: { display: 'flex', alignItems: 'center', gap: '12px', padding: '11px 14px', borderTop: i > 0 ? '1px solid rgba(212,104,138,0.08)' : 'none' } },
      h('div', { style: { flex: '1' } },
        h('div', { style: { fontSize: '14px', fontWeight: '700' } }, day),
        h('div', { style: { fontSize: '12px', color: '#7D6974' } }, time)
      ),
      h('div', { className: 'mono', style: { fontSize: '16px', fontWeight: '600', color: '#7B3F6B' } }, p.weight + ' lbs')
    );
  });

  const readings = h('section', null,
    h('div', { style: { fontSize: '13px', fontWeight: '800', letterSpacing: '0.04em', textTransform: 'uppercase', color: '#8A6479', marginBottom: '10px' } }, 'All Readings'),
    h('div', { style: { background: 'rgba(255,255,255,0.55)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)', border: '1px solid rgba(212,104,138,0.12)', borderRadius: '16px', overflow: 'hidden', boxShadow: '0 4px 24px rgba(180,130,150,0.10), inset 0 1px 0 rgba(255,255,255,0.7)' } },
      ...readingsItems
    )
  );

  return [cycleCard, toggle, chart, stats, readings];
}


// --------- Notification System ---------
let notifSentToday = {};  // key: 'scheduled-8pm' or 'avail-tylenol-{ts}', value: true

function resetNotifTracking() {
  const today = dayStart(Date.now());
  if (notifSentToday._day !== today) {
    notifSentToday = { _day: today };
  }
}

function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function sendNotif(title, body, tag) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  try {
    new Notification(title, { body, icon: 'icon-192.png', tag, requireInteraction: false });
  } catch(e) {
    // Fallback for mobile: use service worker registration
    if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
      navigator.serviceWorker.ready.then(reg => {
        reg.showNotification(title, { body, icon: 'icon-192.png', tag, requireInteraction: false });
      }).catch(() => {});
    }
  }
}

function checkNotifications() {
  if (TEST_MODE) return; // no local reminders from the test app
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  if (!state.loaded || state.entries.length === 0 && !state.demo) return;

  resetNotifTracking();
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const nowTs = now.getTime();

  // Quiet hours: no notifications between 10 PM (22) and 8 AM (8)
  if (h >= 22 || h < 8) return;

  // --- SCHEDULED REMINDERS ---

  // 8:00 PM reminder (20:00) - evening meds
  // Fire between 8:00 PM and 8:05 PM
  if (h === 20 && m < 5 && !notifSentToday['sched-8pm']) {
    const eveningMeds = ['protonix', 'iron', 'buspirone', 'paroxetine', 'compazine'];
    const due = [];
    const d0 = dayStart(nowTs);
    eveningMeds.forEach(medId => {
      const med = MEDS.find(x => x.id === medId);
      if (!med) return;
      // Check if already taken in the evening window today
      if (med.type === 'win') {
        const eveningWin = med.windows.find(w => w.start >= 17);
        if (eveningWin) {
          const ws = d0 + eveningWin.start * 3600000;
          const we = d0 + eveningWin.end * 3600000;
          const taken = state.entries.some(e => e.medId === medId && e.ts >= ws && e.ts < we);
          if (!taken) due.push(med.name);
        } else {
          // Anytime window (iron) - check if taken today at all
          const taken = state.entries.some(e => e.medId === medId && e.ts >= d0);
          if (!taken) due.push(med.name);
        }
      } else if (med.type === 'gap') {
        // Compazine is gap-based but reminder at 8pm
        const st = status(med);
        if (!st.locked) due.push(med.name);
      }
    });
    if (due.length > 0) {
      sendNotif('Evening Meds Due', due.join(', ') + ' — time for evening doses', 'evening-8pm');
    }
    notifSentToday['sched-8pm'] = true;
  }

  // 8:30 AM reminder (8:30) - morning meds
  // Fire between 8:30 AM and 8:35 AM
  if (h === 8 && m >= 30 && m < 35 && !notifSentToday['sched-830am']) {
    const morningMeds = [];
    const d0 = dayStart(nowTs);
    // Protonix morning window
    const protonix = MEDS.find(x => x.id === 'protonix');
    if (protonix) {
      const mornWin = protonix.windows.find(w => w.start < 12);
      if (mornWin) {
        const ws = d0 + mornWin.start * 3600000;
        const we = d0 + mornWin.end * 3600000;
        const taken = state.entries.some(e => e.medId === 'protonix' && e.ts >= ws && e.ts < we);
        if (!taken) morningMeds.push('Protonix');
      }
    }
    if (morningMeds.length > 0) {
      sendNotif('Morning Meds Due', morningMeds.join(', ') + ' — time for morning doses', 'morning-830am');
    }
    notifSentToday['sched-830am'] = true;
  }

  // --- GAP-BASED REMINDERS (fire when med becomes available) ---
  const gapMeds = []; // Zofran is as-needed now — no gap-based availability reminder
  gapMeds.forEach(medId => {
    const med = MEDS.find(x => x.id === medId);
    if (!med) return;
    const st = status(med);

    // Only notify when med just became available (was locked, now open)
    if (st.locked) return;

    // Check daily ceiling - don't notify if ceiling hit
    if (st.ceilingHit) return;

    // For Zofran: the 8:30 AM reminder already covers morning.
    // Only send gap-based for later-in-day availability.
    const last = latest(medId);
    if (!last) return; // No previous dose, don't spam

    // Create a unique key based on the dose timestamp so we only notify once per availability window
    const notifKey = 'avail-' + medId + '-' + last.ts;
    if (notifSentToday[notifKey]) return;

    // Only notify if the gap JUST expired (within the last 2 minutes)
    // This prevents firing on every render cycle
    if (med.type === 'gap' && med.gapH > 0) {
      const gapEnd = last.ts + med.gapH * 3600000;
      const sinceFree = nowTs - gapEnd;
      if (sinceFree >= 0 && sinceFree < 120000) {
        sendNotif(med.name + ' Available', med.name + ' gap timer is up — ready to dose', 'avail-' + medId);
        notifSentToday[notifKey] = true;
      }
    }
  });
}

// Request push notification permission and subscribe to FCM
subscribePush();

// Init
unsub = subscribeEntries((entries) => {
  const wasEmpty = state.entries.length === 0 && !state.loaded;
  if (state.timeModal) {
    // Defer update so the modal isn't destroyed mid-interaction
    pendingEntries = entries;
    if (!state.loaded) { state.loaded = true; state.entries = entries; }
    return;
  }
  setState({ entries, loaded: true });
  // If first load and no entries, offer to seed demo data
  if (wasEmpty && entries.length === 0) {
    seedDemo();
  }
});

setInterval(() => {
  state.now = simNow();
  if (!state.timeModal && !(document.activeElement && document.activeElement.tagName === 'INPUT')) render();
  checkNotifications();
}, 1000);
render();

// Service worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
